<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="dexrun">
</head>
<body>
    <div class="container-cadastro">
        <aside class="left-side" aria-hidden="true">
            <!-- Fundo / imagem à esquerda -> trocar em style.css background-image -->
            <div class="left-overlay"></div>
            <div class="grain"></div>
        </aside>

        <main class="right-side">
            <header class="logo-container">
                <img src="img/Logo.png" alt="Logo DEXRUN">
            </header>

            <section class="form-container">
                <form id="formUsuario" class="cad-form" novalidate>
                    <h3>Dados Cadastrais</h3>

                    <div class="input-group full">
                        <label for="nome">Nome Completo <span class="required">*</span></label>
                        <input type="text" id="nome" class="input">
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="contato">Número de Contato</label>
                            <input type="text" id="contato" class="input" placeholder="(*55)619984-1720">
                        </div>
                        <div class="input-group">
                            <label for="whatsapp">WhatsApp</label>
                            <input type="text" id="whatsapp" class="input" placeholder="(*55)619984-1720">
                        </div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="nacionalidade">Nacionalidade</label>
                            <input type="text" id="nacionalidade" class="input" placeholder="Brasileiro">
                        </div>
                        <div class="input-group">
                            <label for="cpf">CPF <span class="required">*</span></label>
                            <input type="text" id="cpf" class="input" placeholder="000.000.000-00">
                        </div>
                    </div>

                    <h3>Dados de Acesso</h3>

                    <div class="input-group full">
                        <label for="email">E-mail <span class="required">*</span></label>
                        <input type="email" id="email" class="input">
                    </div>

                    <div class="input-group full">
                        <label for="email-repeat">Repetir email</label>
                        <input type="email" id="email-repeat" class="input">
                    </div>

                    <div class="input-group full">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" class="input">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="termos">
                        <label for="termos">Ao clicar em "Criar Conta", você aceita os <a href="#">Termos de Uso</a> e confirma que leu a <a href="#">Política de Privacidade</a>.</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="newsletter">
                        <label for="newsletter">Desejo receber por e-mail ofertas, novidades e materiais promocionais pela Dexrun.</label>
                    </div>

                    <button type="submit" class="btn-create">Criar Conta</button>
                    <a href="/login" class="back-link">Voltar para o Login</a>
                    <a href="home.html" class="back-link">Inicio</a>
                </form>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
